name: Deploy Portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY || secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PRESENCE_DEVICE_ID: ${{ vars.VITE_SUPABASE_PRESENCE_DEVICE_ID || secrets.VITE_SUPABASE_PRESENCE_DEVICE_ID }}
          VITE_SUPABASE_PRESENCE_DEVICE_NAME: ${{ vars.VITE_SUPABASE_PRESENCE_DEVICE_NAME || secrets.VITE_SUPABASE_PRESENCE_DEVICE_NAME }}
          VITE_EMERGENCY_POPUP_PASSWORD_HASH: ${{ vars.VITE_EMERGENCY_POPUP_PASSWORD_HASH || secrets.VITE_EMERGENCY_POPUP_PASSWORD_HASH }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
