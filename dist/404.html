<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        const pathSegmentsToKeep = 0;
        const location = window.location;
        const knownRoutes = new Set(["projects", "research", "cv", "resume", "about"]);
        const pathParts = location.pathname.replace(/^\/+|\/+$/g, "").split("/").filter(Boolean);
        const firstSegment = pathParts[0];

        if (knownRoutes.has(firstSegment)) {
          const normalizedPath = "/" + pathParts.join("/") + "/";
          location.replace(
            location.protocol +
              "//" +
              location.hostname +
              (location.port ? ":" + location.port : "") +
              normalizedPath +
              location.search +
              location.hash
          );
          return;
        }

        location.replace(
          location.protocol +
            "//" +
            location.hostname +
            (location.port ? ":" + location.port : "") +
            location.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
            "/?/" +
            location.pathname
              .slice(1)
              .split("/")
              .slice(pathSegmentsToKeep)
              .join("/")
              .replace(/&/g, "~and~") +
            (location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "") +
            location.hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
